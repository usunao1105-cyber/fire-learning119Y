<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>災害被害状況報告システム</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (for JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom Styles for Print & Animation -->
    <style>
        @layer utilities {
            .animate-fade-in {
                animation: fadeIn 0.3s ease-in-out;
            }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        body {
            background-color: #f1f5f9;
        }
        @media print {
            body { background-color: white; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Icons (Lucide-react replacement for standalone HTML) ---
        const IconBase = ({ children, className, ...props }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width="24" height="24" viewBox="0 0 24 24" 
                fill="none" stroke="currentColor" strokeWidth="2" 
                strokeLinecap="round" strokeLinejoin="round" 
                className={className} {...props}
            >
                {children}
            </svg>
        );

        const AlertTriangle = (props) => <IconBase {...props}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></IconBase>;
        const CheckCircle = (props) => <IconBase {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconBase>;
        const Truck = (props) => <IconBase {...props}><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 10"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></IconBase>;
        const Zap = (props) => <IconBase {...props}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></IconBase>;
        const Droplet = (props) => <IconBase {...props}><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></IconBase>;
        const Home = (props) => <IconBase {...props}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></IconBase>;
        const Plus = (props) => <IconBase {...props}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></IconBase>;
        const Trash2 = (props) => <IconBase {...props}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></IconBase>;
        const Activity = (props) => <IconBase {...props}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></IconBase>;
        const Settings = (props) => <IconBase {...props}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></IconBase>;
        const FileText = (props) => <IconBase {...props}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></IconBase>;
        const Menu = (props) => <IconBase {...props}><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></IconBase>;
        const X = (props) => <IconBase {...props}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></IconBase>;
        const ClipboardList = (props) => <IconBase {...props}><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></IconBase>;
        const Siren = (props) => <IconBase {...props}><path d="M7 12a5 5 0 0 1 5-5v0a5 5 0 0 1 5 5v6H7v-6Z"/><path d="M5 20a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v2H5v-2Z"/><path d="M21 12h1"/><path d="M18.5 4.5 18 5"/><path d="M2 12h1"/><path d="M12 2v1"/><path d="m4.929 4.929.707.707"/><path d="M12 7a5 5 0 0 0-5 5v6h10v-6a5 5 0 0 0-5-5"/></IconBase>;
        const User = (props) => <IconBase {...props}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></IconBase>;
        const Clock = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></IconBase>;
        const Printer = (props) => <IconBase {...props}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></IconBase>;
        const Users = (props) => <IconBase {...props}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconBase>;
        const Heart = (props) => <IconBase {...props}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></IconBase>;
        const Megaphone = (props) => <IconBase {...props}><path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></IconBase>;
        const Edit = (props) => <IconBase {...props}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></IconBase>;

        // --- 初期データ定義 ---
        const INITIAL_FACILITIES = [
          { id: 1, name: '第1車庫 (ポンプ車)', type: 'garage', doorType: 'automatic', status: 'unknown', lastChecked: '-', lastReporter: '-' },
          { id: 2, name: '第2車庫 (救急車)', type: 'garage', doorType: 'manual', status: 'unknown', lastChecked: '-', lastReporter: '-' },
          { id: 3, name: '自家発電室', type: 'power', status: 'unknown', lastChecked: '-', lastReporter: '-' },
          { id: 4, name: '庁舎 1階事務室', type: 'building', status: 'unknown', lastChecked: '-', lastReporter: '-' },
          { id: 5, name: '庁舎 2階仮眠室', type: 'building', status: 'unknown', lastChecked: '-', lastReporter: '-' },
          { id: 6, name: '訓練塔', type: 'training', status: 'unknown', lastChecked: '-', lastReporter: '-' },
        ];

        const INITIAL_VEHICLES = [
          { id: 1, name: 'ポンプ車1号', facilityId: 1, status: 'operational' },
          { id: 2, name: '高規格救急車', facilityId: 2, status: 'operational' },
        ];

        // --- ユーティリティ関数 ---
        const getCurrentDateTimeLocal = () => {
          const now = new Date();
          now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
          return now.toISOString().slice(0, 16);
        };
        
        // --- Helper Functions (App外に移動) ---
        const getStatusColor = (status) => {
            switch (status) {
              case 'safe': return 'bg-green-100 text-green-800 border-green-300';
              case 'caution': return 'bg-yellow-100 text-yellow-800 border-yellow-300';
              case 'danger': return 'bg-red-100 text-red-800 border-red-300';
              default: return 'bg-gray-100 text-gray-800 border-gray-300';
            }
        };

        const getStatusText = (status) => {
            switch (status) {
              case 'safe': return '異常なし';
              case 'caution': return '注意・軽微な損壊';
              case 'danger': return '使用不可・危険';
              default: return '未確認';
            }
        };
          
        const getPersonnelStatusText = (status) => {
            switch (status) {
              case 'safe': return '健康・異常なし';
              case 'minor': return '軽傷・体調不良';
              case 'critical': return '重傷・行動不能';
              default: return '不明';
            }
        };

        // --- Sub-Components (App外に定義) ---

        const DashboardView = ({ facilities, personnelReports, currentUser, setCurrentUser, navigate }) => {
            const unknownCount = facilities.filter(f => f.status === 'unknown').length;
            const dangerCount = facilities.filter(f => f.status === 'danger').length;
            const powerStatus = facilities.find(f => f.type === 'power')?.status || 'unknown';
            
            const injuredCount = personnelReports.filter(p => p.status === 'minor' || p.status === 'critical').length;
            const uniqueReporters = new Set(personnelReports.map(p => p.name)).size;

            return (
              <div className="space-y-6 animate-fade-in">
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                  <label className="block text-xs font-bold text-gray-500 uppercase mb-1 flex items-center">
                    <User className="w-4 h-4 mr-1" /> 現在の操作者名 (指令室/指揮者)
                  </label>
                  <input
                    type="text"
                    placeholder="氏名を入力してください"
                    className="w-full p-2 border-b-2 border-gray-300 focus:border-blue-500 outline-none bg-transparent font-bold text-lg"
                    value={currentUser}
                    onChange={(e) => setCurrentUser(e.target.value)}
                  />
                  <p className="text-xs text-gray-400 mt-1">※ここに入力した名前が報告に自動記録されます</p>
                </div>
                
                <button 
                    onClick={() => navigate('announcement')}
                    className="w-full bg-indigo-600 hover:bg-indigo-700 text-white p-4 rounded-xl shadow-md flex items-center justify-between transition transform active:scale-95 border-l-8 border-indigo-800"
                >
                    <div className="flex items-center">
                        <Megaphone className="w-8 h-8 mr-3" />
                        <div className="text-left">
                            <div className="text-lg font-bold">緊急アナウンスガイド</div>
                            <div className="text-xs opacity-80">発災直後の指示・点検命令読み上げ用</div>
                        </div>
                    </div>
                    <span className="bg-white/20 px-3 py-1 rounded text-sm font-bold">開く</span>
                </button>

                <div className="grid grid-cols-2 gap-4">
                  <div className={`p-4 rounded-xl border-2 text-center shadow-sm ${powerStatus === 'danger' ? 'bg-red-50 border-red-500' : 'bg-white border-gray-200'}`}>
                    <div className="flex justify-center mb-2">
                      <Zap className={`w-8 h-8 ${powerStatus === 'danger' ? 'text-red-600' : 'text-yellow-500'}`} />
                    </div>
                    <div className="text-sm text-gray-500 font-bold">電源・発電機</div>
                    <div className="text-lg font-bold">{getStatusText(powerStatus)}</div>
                  </div>
                  <div className={`p-4 rounded-xl border-2 text-center shadow-sm ${dangerCount > 0 ? 'bg-red-50 border-red-500' : 'bg-white border-gray-200'}`}>
                     <div className="flex justify-center mb-2">
                      <AlertTriangle className={`w-8 h-8 ${dangerCount > 0 ? 'text-red-600' : 'text-gray-400'}`} />
                    </div>
                    <div className="text-sm text-gray-500 font-bold">危険箇所</div>
                    <div className="text-lg font-bold">{dangerCount} 箇所</div>
                  </div>
                </div>
                
                <div className={`p-4 rounded-xl border-2 shadow-sm flex justify-between items-center ${injuredCount > 0 ? 'bg-orange-50 border-orange-300' : 'bg-white border-blue-200'}`} onClick={() => navigate('personnel')}>
                    <div className="flex items-center">
                        <Users className={`w-8 h-8 mr-3 ${injuredCount > 0 ? 'text-orange-500' : 'text-blue-500'}`} />
                        <div>
                            <div className="text-sm text-gray-500 font-bold">人員報告</div>
                            <div className="text-lg font-bold">報告済: {uniqueReporters} 名</div>
                        </div>
                    </div>
                    <div className="text-right">
                        <div className="text-xs text-gray-500 font-bold">負傷・体調不良</div>
                        <div className={`text-xl font-bold ${injuredCount > 0 ? 'text-red-600' : 'text-green-600'}`}>{injuredCount} 名</div>
                    </div>
                </div>

                <div className="space-y-3">
                  <button 
                    onClick={() => navigate('quick')}
                    className="w-full bg-red-600 hover:bg-red-700 text-white p-5 rounded-xl shadow-lg flex items-center justify-between transition transform active:scale-95"
                  >
                    <div className="text-left">
                      <div className="text-xl font-bold">即時報告（一次確認）</div>
                      <div className="text-sm opacity-90">車庫開閉、出動可否のチェック（代理入力）</div>
                    </div>
                    <Siren className="w-10 h-10" />
                  </button>
                  
                  <button 
                    onClick={() => navigate('personnel')}
                    className="w-full bg-orange-500 hover:bg-orange-600 text-white p-5 rounded-xl shadow-lg flex items-center justify-between transition transform active:scale-95"
                  >
                    <div className="text-left">
                      <div className="text-xl font-bold">人員安全報告</div>
                      <div className="text-sm opacity-90">勤務者健康状態・自宅待機者報告</div>
                    </div>
                    <Heart className="w-10 h-10" />
                  </button>

                  <button 
                    onClick={() => navigate('detailed')}
                    className="w-full bg-blue-600 hover:bg-blue-700 text-white p-5 rounded-xl shadow-lg flex items-center justify-between transition transform active:scale-95"
                  >
                    <div className="text-left">
                      <div className="text-xl font-bold">詳細損壊報告</div>
                      <div className="text-sm opacity-90">建物、設備、ライフライン</div>
                    </div>
                    <ClipboardList className="w-10 h-10" />
                  </button>
                </div>

                <div className="bg-white rounded-xl shadow p-4">
                  <h3 className="font-bold text-gray-700 mb-3 flex items-center">
                    <Activity className="w-5 h-5 mr-2" />
                    施設状況一覧
                  </h3>
                  <div className="space-y-2">
                    {facilities.map(f => (
                      <div key={f.id} className={`flex justify-between items-center p-3 rounded-lg border ${getStatusColor(f.status)}`}>
                        <span className="font-medium">{f.name}</span>
                        <span className="text-sm font-bold px-2 py-1 bg-white/50 rounded">{getStatusText(f.status)}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            );
        };

        const QuickReportView = ({ facilities, currentUser, setCurrentUser, addReport, navigate }) => {
            const criticalFacilities = facilities.filter(f => 
              f.type === 'garage' || f.type === 'power'
            );

            const [responses, setResponses] = useState({});

            const handleQuickSubmit = (facilityId, status) => {
              const facility = facilities.find(f => f.id === facilityId);
              addReport({
                locationName: facility.name,
                facilityId: facility.id,
                type: 'quick',
                status: status,
                note: 'クイックチェック報告（無線報告代理入力）',
                timestamp: new Date().toLocaleString('ja-JP'),
              });
              setResponses({ ...responses, [facilityId]: status });
            };

            return (
              <div className="space-y-4">
                <div className="bg-white px-4 py-2 rounded-lg shadow-sm border flex justify-between items-center">
                   <span className="text-sm text-gray-500 flex items-center"><User className="w-4 h-4 mr-1"/> 入力者:</span>
                   <input 
                      type="text" 
                      value={currentUser} 
                      onChange={(e) => setCurrentUser(e.target.value)}
                      placeholder="未入力"
                      className="font-bold text-right outline-none bg-transparent w-32 focus:border-b focus:border-blue-500"
                   />
                </div>

                <div className="bg-red-50 p-4 rounded-lg border border-red-200 mb-4">
                  <h2 className="font-bold text-red-800 flex items-center">
                    <Siren className="w-6 h-6 mr-2" />
                    第一次 緊急点検モード
                  </h2>
                  <p className="text-sm text-red-700 mt-1">
                    隊員からの無線・口頭報告に基づき、指揮者が代理入力します。
                  </p>
                </div>

                {criticalFacilities.map(f => (
                  <div key={f.id} className="bg-white p-4 rounded-xl shadow border-l-4 border-l-blue-500">
                    <div className="flex justify-between items-start mb-3">
                      <div>
                        <h3 className="font-bold text-lg">{f.name}</h3>
                        {f.type === 'garage' && (
                          <span className="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded mt-1 inline-block">
                            {f.doorType === 'automatic' ? '電動シャッター' : '手動シャッター'}
                          </span>
                        )}
                      </div>
                    </div>

                    <p className="text-gray-700 mb-4 font-bold">
                      {f.type === 'garage' ? '報告: シャッターは開きますか？出庫可能ですか？' : '報告: 正常に作動していますか？'}
                    </p>

                    <div className="grid grid-cols-2 gap-3">
                      <button 
                        onClick={() => handleQuickSubmit(f.id, 'safe')}
                        className={`p-4 rounded-lg font-bold border-2 flex flex-col items-center justify-center transition-all duration-200 ${
                          responses[f.id] === 'safe' 
                            ? 'bg-green-600 text-white border-green-600 shadow-inner ring-4 ring-green-200 scale-95' 
                            : 'bg-white text-green-700 border-green-600 hover:bg-green-50 shadow-md'
                        }`}
                      >
                        {responses[f.id] === 'safe' && <CheckCircle className="w-8 h-8 mb-1 animate-bounce" />}
                        <span>正常・開放可</span>
                      </button>
                      
                      <button 
                        onClick={() => handleQuickSubmit(f.id, 'danger')}
                        className={`p-4 rounded-lg font-bold border-2 flex flex-col items-center justify-center transition-all duration-200 ${
                          responses[f.id] === 'danger' 
                            ? 'bg-red-600 text-white border-red-600 shadow-inner ring-4 ring-red-200 scale-95' 
                            : 'bg-white text-red-700 border-red-600 hover:bg-red-50 shadow-md'
                        }`}
                      >
                        {responses[f.id] === 'danger' && <AlertTriangle className="w-8 h-8 mb-1 animate-pulse" />}
                        <span>異常・開放不可</span>
                      </button>
                    </div>
                    {f.doorType === 'automatic' && (
                      <div className="mt-2 text-xs text-gray-500">
                        ※電動が開かない場合は手動開放装置を確認してください
                      </div>
                    )}
                  </div>
                ))}

                <button 
                  onClick={() => navigate('dashboard')}
                  className="w-full bg-gray-600 text-white p-4 rounded-xl mt-6 font-bold"
                >
                  ダッシュボードへ戻る
                </button>
              </div>
            );
        };

        const DetailedReportView = ({ facilities, currentUser, setCurrentUser, addReport, navigate }) => {
            const [selectedFacilityId, setSelectedFacilityId] = useState('');
            const [status, setStatus] = useState('safe');
            const [details, setDetails] = useState('');
            const [waterStatus, setWaterStatus] = useState('ok'); 
            
            const [reportTime, setReportTime] = useState(getCurrentDateTimeLocal());
            const [reporterName, setReporterName] = useState(currentUser);

            const handleSubmit = () => {
              if (!selectedFacilityId) return;
              const facility = facilities.find(f => f.id === parseInt(selectedFacilityId));
              
              const formattedTime = new Date(reportTime).toLocaleString('ja-JP');

              addReport({
                locationName: facility.name,
                facilityId: facility.id,
                type: 'detailed',
                status: status,
                waterStatus: waterStatus,
                note: details,
                reporter: reporterName,
                timestamp: formattedTime
              });

              if (reporterName && reporterName !== currentUser) {
                setCurrentUser(reporterName);
              }

              alert('詳細報告を送信しました。');
              navigate('dashboard');
            };

            return (
              <div className="space-y-6">
                <h2 className="text-xl font-bold text-gray-800 border-b pb-2">詳細損壊状況報告</h2>

                <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 space-y-3">
                  <div>
                    <label className="block text-sm font-bold text-gray-700 mb-1 flex items-center">
                      <Clock className="w-4 h-4 mr-1"/> 点検日時
                    </label>
                    <input 
                      type="datetime-local"
                      className="w-full p-2 border rounded bg-gray-50"
                      value={reportTime}
                      onChange={(e) => setReportTime(e.target.value)}
                    />
                  </div>
                  <div>
                    <label className="block text-sm font-bold text-gray-700 mb-1 flex items-center">
                      <User className="w-4 h-4 mr-1"/> 実施者（報告者）
                    </label>
                    <input 
                      type="text"
                      className="w-full p-2 border rounded"
                      placeholder="報告者名"
                      value={reporterName}
                      onChange={(e) => setReporterName(e.target.value)}
                    />
                  </div>
                </div>

                <div>

                <div className="mb-8 break-inside-avoid">
                    <h2 className="text-lg font-bold border-b-2 border-gray-400 mb-2">3. 人員安全管理状況</h2>
                    <div className="grid grid-cols-2 gap-4 mb-4">
                         <div className="border border-gray-300 p-2 text-center">
                            <span className="text-sm">報告総数</span>
                            <div className="font-bold text-xl">{personnelReports.length} 名</div>
                         </div>
                         <div className="border border-gray-300 p-2 text-center bg-red-50">
                            <span className="text-sm text-red-600">負傷・体調不良</span>
                            <div className="font-bold text-xl text-red-600">{personnelReports.filter(p => p.status === 'minor' || p.status === 'critical').length} 名</div>
                         </div>
                    </div>
                    
                    <table className="w-full text-sm text-left border-collapse border border-slate-500">
                        <thead className="bg-slate-200">
                            <tr>
                                <th className="border border-slate-500 p-2 w-32">日時</th>
                                <th className="border border-slate-500 p-2">対象者氏名</th>
                                <th className="border border-slate-500 p-2">報告者(入力)</th>
                                <th className="border border-slate-500 p-2 w-24">場所</th>
                                <th className="border border-slate-500 p-2 w-32">健康状態・安否</th>
                                <th className="border border-slate-500 p-2">備考</th>
                            </tr>
                        </thead>
                        <tbody>
                            {personnelReports.map(p => (
                                <tr key={p.id} className="border-b border-slate-300">
                                    <td className="border border-slate-500 p-2">{p.timestamp}</td>
                                    <td className="border border-slate-500 p-2 font-bold">{p.name}</td>
                                    <td className="border border-slate-500 p-2">{p.reporter || '-'}</td>
                                    <td className="border border-slate-500 p-2">{p.location === 'station' ? '庁舎' : p.location === 'home' ? '自宅' : 'その他'}</td>
                                    <td className={`border border-slate-500 p-2 font-bold ${p.status === 'safe' ? 'text-green-700' : 'text-red-600'}`}>
                                        {getPersonnelStatusText(p.status)}
                                    </td>
                                    <td className="border border-slate-500 p-2">{p.note}</td>
                                </tr>
                            ))}
                            {personnelReports.length === 0 && (
                                <tr><td colSpan="6" className="p-4 text-center text-gray-500">報告なし</td></tr>
                            )}
                        </tbody>
                    </table>
                </div>
          
                <div>
                  <h2 className="text-lg font-bold border-b-2 border-gray-400 mb-2">4. 施設詳細報告履歴（時系列）</h2>
                  <table className="w-full text-sm text-left border-collapse border border-slate-500">
                    <thead className="bg-slate-200">
                      <tr>
                        <th className="border border-slate-500 p-2 w-32">日時</th>
                        <th className="border border-slate-500 p-2 w-24">報告者</th>
                        <th className="border border-slate-500 p-2 w-40">場所</th>
                        <th className="border border-slate-500 p-2">内容・備考</th>
                      </tr>
                    </thead>
                    <tbody>
                      {reports.map(r => (
                         <tr key={r.id} className="border-b border-slate-300">
                           <td className="border border-slate-500 p-2 text-xs">{r.timestamp}</td>
                           <td className="border border-slate-500 p-2 text-xs">{r.reporter}</td>
                           <td className="border border-slate-500 p-2 text-xs">{r.locationName}</td>
                           <td className="border border-slate-500 p-2 text-xs">
                             <span className={`inline-block px-1 rounded text-white mr-2 ${r.status === 'danger' ? 'bg-red-500' : r.status === 'safe' ? 'bg-green-600' : 'bg-yellow-500'}`}>
                                {getStatusText(r.status)}
                             </span>
                             {r.note && <div className="text-gray-700 mt-1">{r.note}</div>}
                           </td>
                         </tr>
                      ))}
                      {reports.length === 0 && (
                        <tr><td colSpan="4" className="p-8 text-center text-gray-500">履歴情報はありません</td></tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            );
        };

        const AnnouncementView = () => {
            const [tab, setTab] = useState('initial'); 

            return (
              <div className="space-y-4 animate-fade-in">
                  <h2 className="text-xl font-bold text-gray-800 border-b pb-2 flex items-center">
                      <Megaphone className="w-6 h-6 mr-2 text-indigo-600" />
                      緊急アナウンスガイド
                  </h2>
                  <p className="text-sm text-gray-600 mb-4">
                      指揮者・当直責任者用読み上げ原稿。状況に合わせてタブを切り替えてください。
                  </p>

                  <div className="flex space-x-2 mb-4">
                      <button 
                          onClick={() => setTab('initial')}
                          className={`flex-1 py-2 px-3 rounded-lg font-bold text-sm ${tab === 'initial' ? 'bg-indigo-600 text-white shadow' : 'bg-white text-gray-600 border'}`}
                      >
                          1. 発災直後
                      </button>
                      <button 
                          onClick={() => setTab('normal')}
                          className={`flex-1 py-2 px-3 rounded-lg font-bold text-sm ${tab === 'normal' ? 'bg-indigo-600 text-white shadow' : 'bg-white text-gray-600 border'}`}
                      >
                          2. 指示(通常)
                      </button>
                      <button 
                          onClick={() => setTab('detail')}
                          className={`flex-1 py-2 px-3 rounded-lg font-bold text-sm ${tab === 'detail' ? 'bg-indigo-600 text-white shadow' : 'bg-white text-gray-600 border'}`}
                      >
                          2. 指示(詳細)
                      </button>
                  </div>

                  <div className="bg-white p-6 rounded-xl shadow-lg border-2 border-indigo-100 min-h-[400px]">
                      {tab === 'initial' && (
                          <div className="space-y-6">
                              <div className="bg-indigo-50 text-indigo-800 px-4 py-2 rounded-lg font-bold text-center mb-4">
                                  発災直後・職員集合時
                              </div>
                              <div className="prose max-w-none text-gray-800">
                                  <p className="font-bold text-gray-500 text-sm mb-2">（自身の安全を確保した後、放送または口頭で）</p>
                                  <div className="text-2xl font-bold leading-relaxed border-l-8 border-indigo-500 pl-6 py-2">
                                      「総員、注目。<br/>
                                      只今、地震が発生しました。<br/><br/>
                                      各隊員は、直ちにヘルメット着装の上、<br/>
                                      <span className="text-red-600 text-3xl">執務室へ一時集合</span><br/>
                                      してください。<br/><br/>
                                      繰り返します。<br/>
                                      各隊員は、身の安全を確保し、<br/>
                                      執務室へ集合してください。」
                                  </div>
                              </div>
                          </div>
                      )}
                      
                      {tab === 'normal' && (
                          <div className="space-y-6">
                              <div className="bg-blue-50 text-blue-800 px-4 py-2 rounded-lg font-bold text-center mb-4">
                                  点検指示：パターンA（通常・バディ体制）
                              </div>
                              <div className="prose max-w-none text-gray-800">
                                  <p className="font-bold text-gray-500 text-sm mb-2">（全員の顔が見えたら指示）</p>
                                  <div className="text-xl font-bold leading-relaxed border-l-8 border-blue-500 pl-6 py-2">
                                      「これより庁舎および車両の<br/>
                                      <span className="text-blue-700">『第一次 緊急点検』</span>を実施します。<br/><br/>
                                      安全管理のため、<br/>
                                      <span className="text-red-600 bg-yellow-100 px-2">必ず2名1組（バディ）</span><br/>
                                      で行動してください。単独行動は厳禁です。<br/><br/>
                                      各隊は担当場所へ向かい、<br/>
                                      <span className="text-blue-700">『車庫のシャッターが開くか』</span><br/>
                                      <span className="text-blue-700">『電源が入るか』</span><br/>
                                      を確認してください。<br/><br/>
                                      アプリ入力はここで行います。<br/>
                                      確認結果は、<br/>
                                      <span className="text-red-600">無線または口頭で即座に報告</span><br/>
                                      してください。<br/><br/>
                                      質問はありますか？<br/>
                                      ...なければ、点検開始！」
                                  </div>
                              </div>
                          </div>
                      )}

                      {tab === 'detail' && (
                          <div className="space-y-6">
                              <div className="bg-orange-50 text-orange-800 px-4 py-2 rounded-lg font-bold text-center mb-4">
                                   点検指示：パターンB（新人・詳細指示）
                              </div>
                              <div className="prose max-w-none text-gray-800">
                                  <div className="text-xl font-bold leading-relaxed border-l-8 border-orange-500 pl-6 py-2">
                                       「これより緊急点検を行います。<br/>
                                       落ち着いて聞いてください。<br/><br/>
                                       1. 体制について<br/>
                                       これより<span className="text-red-600 bg-yellow-100 px-2">2名1組</span>を作ってください。<br/>
                                       お互いの安全を確認しながら行動すること。<br/><br/>
                                       2. 確認内容<br/>
                                       担当場所へ向かい、<br/>
                                       <span className="text-blue-700">『車庫のシャッターが開き、車両が出せるか』</span><br/>
                                       <span className="text-blue-700">『自家発が回っているか』</span><br/>
                                       を目視確認してください。<br/><br/>
                                       3. 報告方法<br/>
                                       タブレット等の操作は不要です。<br/>
                                       確認後、直ちに無線または走って戻り、<br/>
                                       <span className="text-red-600">私に口頭で報告</span>してください。<br/>
                                       私が入力します。<br/><br/>
                                       電動シャッターが開かない場合は、<br/>
                                       手動切替も確認してください。<br/>
                                       以上、点検開始！」
                                  </div>
                              </div>
                          </div>
                      )}
                  </div>
              </div>
            );
        };

        // --- Main App Component ---
        function App() {
          const [view, setView] = useState('dashboard');
          const [facilities, setFacilities] = useState(INITIAL_FACILITIES);
          const [vehicles, setVehicles] = useState(INITIAL_VEHICLES);
          const [reports, setReports] = useState([]);
          const [personnelReports, setPersonnelReports] = useState([]);
          const [sidebarOpen, setSidebarOpen] = useState(false);
          const [currentUser, setCurrentUser] = useState('');

          const addReport = (report) => {
            const newReport = {
              id: Date.now(),
              timestamp: report.timestamp || new Date().toLocaleString('ja-JP'),
              reporter: report.reporter || currentUser || '未記名',
              ...report
            };
            setReports([newReport, ...reports]);

            if (report.facilityId) {
              setFacilities(facilities.map(f => 
                f.id === report.facilityId ? { 
                  ...f, 
                  status: report.status,
                  lastChecked: newReport.timestamp,
                  lastReporter: newReport.reporter
                } : f
              ));
            }
          };
          
          const addPersonnelReport = (report) => {
            const newReport = {
              id: Date.now(),
              timestamp: new Date().toLocaleString('ja-JP'),
              ...report
            };
            setPersonnelReports([newReport, ...personnelReports]);
          };

          // Update existing personnel report
          const updatePersonnelReport = (updatedReport) => {
            setPersonnelReports(personnelReports.map(r => (r.id === updatedReport.id ? { ...r, ...updatedReport } : r)));
          };

          const navigate = (targetView) => {
            setView(targetView);
            setSidebarOpen(false);
          };

          return (
            <div className="min-h-screen font-sans text-slate-900 pb-20 print:bg-white print:pb-0">
              <header className="bg-slate-900 text-white p-4 sticky top-0 z-50 shadow-md print:hidden">
                <div className="flex justify-between items-center max-w-3xl mx-auto">
                  <div className="flex items-center space-x-2 cursor-pointer" onClick={() => navigate('dashboard')}>
                    <Home className="w-6 h-6" />
                    <h1 className="text-xl font-bold tracking-wider">災害報告システム</h1>
                  </div>
                  <button onClick={() => setSidebarOpen(true)} className="p-1">
                    <Menu className="w-7 h-7" />
                  </button>
                </div>
              </header>

              {sidebarOpen && (
                <div className="fixed inset-0 z-50 flex print:hidden">
                  <div className="bg-black/50 flex-1" onClick={() => setSidebarOpen(false)}></div>
                  <div className="bg-white w-64 h-full shadow-xl p-4 flex flex-col">
                    <div className="flex justify-end mb-6">
                      <button onClick={() => setSidebarOpen(false)}><X className="w-8 h-8 text-gray-500" /></button>
                    </div>
                    <nav className="space-y-4 text-lg font-bold text-gray-700">
                      <button onClick={() => navigate('dashboard')} className="flex items-center w-full p-2 hover:bg-gray-100 rounded">
                        <Activity className="mr-3" /> ダッシュボード
                      </button>
                      <button onClick={() => navigate('announcement')} className="flex items-center w-full p-2 hover:bg-gray-100 rounded text-indigo-600 bg-indigo-50">
                        <Megaphone className="mr-3" /> アナウンスガイド
                      </button>
                      <button onClick={() => navigate('quick')} className="flex items-center w-full p-2 hover:bg-gray-100 rounded text-red-600">
                        <Siren className="mr-3" /> 即時報告
                      </button>
                      <button onClick={() => navigate('personnel')} className="flex items-center w-full p-2 hover:bg-gray-100 rounded text-orange-600">
                        <Heart className="mr-3" /> 人員安全報告
                      </button>
                      <button onClick={() => navigate('detailed')} className="flex items-center w-full p-2 hover:bg-gray-100 rounded">
                        <ClipboardList className="mr-3" /> 詳細報告
                      </button>
                      <button onClick={() => navigate('history')} className="flex items-center w-full p-2 hover:bg-gray-100 rounded">
                        <FileText className="mr-3" /> 報告履歴
                      </button>
                      <button onClick={() => navigate('report')} className="flex items-center w-full p-2 hover:bg-gray-100 rounded text-blue-600 bg-blue-50">
                        <Printer className="mr-3" /> レポート出力
                      </button>
                      <hr className="border-gray-200" />
                      <button onClick={() => navigate('settings')} className="flex items-center w-full p-2 hover:bg-gray-100 rounded">
                        <Settings className="mr-3" /> 点検箇所管理
                      </button>
                    </nav>
                    <div className="mt-auto text-xs text-gray-400 text-center pb-4">
                      Fire Station Disaster Check<br/>Ver 1.5
                    </div>
                  </div>
                </div>
              )}

              <main className={`max-w-3xl mx-auto p-4 print:max-w-none print:p-0`}>
                {view === 'dashboard' && (
                    <DashboardView 
                        facilities={facilities} 
                        personnelReports={personnelReports} 
                        currentUser={currentUser} 
                        setCurrentUser={setCurrentUser} 
                        navigate={navigate} 
                    />
                )}
                {view === 'quick' && (
                    <QuickReportView 
                        facilities={facilities} 
                        currentUser={currentUser} 
                        setCurrentUser={setCurrentUser} 
                        addReport={addReport} 
                        navigate={navigate} 
                    />
                )}
                {view === 'detailed' && (
                    <DetailedReportView 
                        facilities={facilities} 
                        currentUser={currentUser} 
                        setCurrentUser={setCurrentUser} 
                        addReport={addReport} 
                        navigate={navigate} 
                    />
                )}
                {view === 'settings' && (
                    <SettingsView 
                        facilities={facilities} 
                        setFacilities={setFacilities} 
                    />
                )}
                {view === 'history' && <ReportsLogView reports={reports} />}
                {view === 'report' && (
                    <ReportExportView 
                        facilities={facilities} 
                        reports={reports} 
                        personnelReports={personnelReports} 
                        currentUser={currentUser} 
                    />
                )}
                {view === 'personnel' && (
                    <PersonnelReportView 
                        currentUser={currentUser} 
                        setCurrentUser={setCurrentUser} 
                        addPersonnelReport={addPersonnelReport} 
                        updatePersonnelReport={updatePersonnelReport}
                        personnelReports={personnelReports} 
                        navigate={navigate} 
                    />
                )}
                {view === 'announcement' && <AnnouncementView />}
              </main>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
