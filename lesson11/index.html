<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>捜索支援マップ</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Leaflet (地図ライブラリ) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <!-- QRCode.js (QRコード生成用) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <!-- 📱 アプリ化（PWA・ホーム画面アイコン）の設定 -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb"> <!-- スマホのステータスバーの色(青色) -->
  <link rel="apple-touch-icon" href="icon-192.png"> <!-- iPhone用アイコン -->
  <link rel="icon" type="image/png" href="icon-192.png"> <!-- ブラウザタブ用アイコン -->

  <style>
    /* 地図の高さ調整 */
    #map { height: 100%; width: 100%; z-index: 10; }
    /* チャットエリアのスクロールバーを隠す */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 h-screen overflow-hidden flex flex-col">

  <!-- ヘッダー -->
  <header class="bg-blue-600 text-white p-3 shadow-md flex justify-between items-center z-20">
    <div class="flex items-center">
      <span class="text-xl mr-2">🚁</span>
      <h1 class="text-lg font-bold">捜索支援マップ</h1>
    </div>
    <div id="status-badge" class="bg-gray-500 text-xs px-2 py-1 rounded-full font-bold">待機中</div>
  </header>

  <!-- メインコンテンツ（初期画面） -->
  <div id="setup-screen" class="flex-1 flex flex-col items-center justify-center p-6 bg-white overflow-y-auto z-30 relative">
    <h2 class="text-2xl font-bold mb-6 text-blue-800">運用開始</h2>
    
    <button id="btn-start-hq" class="w-full max-w-sm bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-4 rounded-lg shadow-lg mb-4 text-lg transition duration-200">
      🏢 新規オペレーション展開 (本部)
    </button>
    
    <div class="my-4 text-gray-400 font-bold">または</div>
    
    <div class="w-full max-w-sm border-2 border-dashed border-gray-300 p-6 rounded-lg text-center">
      <p class="text-sm text-gray-600 mb-4">現場の隊員は、本部が提示するQRコードをカメラで読み込んで参加してください。</p>
      <div class="text-4xl text-gray-300">📱🔍</div>
    </div>
  </div>

  <!-- QRコード表示モーダル (本部用) -->
  <div id="modal-qr" class="fixed inset-0 bg-black bg-opacity-70 z-50 flex items-center justify-center hidden">
    <div class="bg-white p-6 rounded-lg shadow-xl text-center max-w-sm w-full relative">
      <button id="btn-close-qr" class="absolute top-2 right-2 text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
      <h3 class="text-lg font-bold mb-2 text-blue-800">隊員追加QRコード</h3>
      <p class="text-xs text-gray-600 mb-4">現場隊員のスマホカメラで読み込ませてください</p>
      <div id="qrcode-container" class="flex justify-center bg-white p-2 mb-4 border-2 border-gray-200 rounded"></div>
      <div class="text-xs text-gray-500 break-all bg-gray-100 p-2 rounded" id="share-url"></div>
    </div>
  </div>

  <!-- 参加情報入力画面 (現場隊員用) -->
  <div id="join-screen" class="fixed inset-0 bg-white z-40 flex flex-col items-center justify-center p-6 hidden">
    <h2 class="text-2xl font-bold mb-2 text-blue-800">捜索ネットワークに参加</h2>
    <p class="text-sm text-gray-600 mb-6">あなたの情報を入力して現場に合流します。</p>
    
    <div class="w-full max-w-sm space-y-4">
      <div>
        <label class="block text-gray-700 text-sm font-bold mb-2">氏名 または コールサイン</label>
        <input type="text" id="input-name" class="shadow appearance-none border rounded w-full py-3 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" placeholder="例: 鈴木 小隊長">
      </div>
      <div>
        <label class="block text-gray-700 text-sm font-bold mb-2">連絡先 (任意)</label>
        <input type="tel" id="input-phone" class="shadow appearance-none border rounded w-full py-3 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" placeholder="090-XXXX-XXXX">
      </div>
      <button id="btn-join" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-lg shadow-lg mt-4 transition duration-200">
        現場に合流する
      </button>
    </div>
  </div>

  <!-- マップ＆チャット画面 -->
  <div id="map-chat-screen" class="flex-1 flex flex-col hidden relative h-full">
    
    <!-- マップエリア -->
    <div class="flex-1 relative">
      <div id="map"></div>
      
      <!-- 本部用ツールボタン群 -->
      <div id="hq-tools" class="absolute top-2 right-2 z-[400] flex flex-col space-y-2 hidden">
        <button id="btn-show-qr" class="bg-white p-2 rounded shadow-md border border-gray-300 hover:bg-gray-100" title="QRコードを表示">
          📱 追加
        </button>
        <button id="btn-toggle-members" class="bg-white p-2 rounded shadow-md border border-gray-300 hover:bg-gray-100" title="隊員一覧">
          👥 一覧
        </button>
      </div>

      <!-- 現場用ツールボタン群 -->
      <div id="field-tools" class="absolute top-2 right-2 z-[400] flex flex-col space-y-2 hidden">
        <button id="btn-my-location" class="bg-white p-2 rounded shadow-md border border-gray-300 hover:bg-gray-100 text-blue-600 font-bold" title="現在地に戻る">
          📍 現在地
        </button>
        <button id="btn-leave" class="bg-white p-2 rounded shadow-md border border-red-300 text-red-600 hover:bg-red-50" title="退出する">
          🚪 退出
        </button>
      </div>
    </div>

    <!-- 隊員一覧パネル (本部用) -->
    <div id="members-panel" class="absolute top-0 right-0 w-64 h-2/3 bg-white shadow-xl z-[500] transform translate-x-full transition-transform duration-300 flex flex-col border-l border-gray-200">
      <div class="bg-blue-100 p-3 font-bold text-blue-800 flex justify-between items-center border-b">
        隊員一覧
        <button id="btn-close-members" class="text-gray-500 hover:text-gray-800">&times;</button>
      </div>
      <div id="members-list" class="flex-1 overflow-y-auto p-2 space-y-2 text-sm">
        <!-- 隊員リストがここに入る -->
      </div>
    </div>

    <!-- チャットエリア (下部) -->
    <div class="h-1/3 bg-white flex flex-col border-t border-gray-300 z-20 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)]">
      <!-- メッセージ表示部 -->
      <div id="chat-messages" class="flex-1 overflow-y-auto p-3 space-y-2 no-scrollbar bg-gray-50">
        <div class="text-center text-xs text-gray-400 my-2">-- 通信ログ開始 --</div>
      </div>
      <!-- 入力部 -->
      <div class="p-2 bg-gray-200 flex items-center space-x-2 pb-safe">
        <input type="text" id="chat-input" class="flex-1 rounded-full py-2 px-4 border border-gray-300 focus:outline-none focus:border-blue-500 text-sm" placeholder="メッセージを送信...">
        <button id="btn-send-chat" class="bg-blue-600 text-white rounded-full p-2 w-10 h-10 flex items-center justify-center hover:bg-blue-700 shadow">
          ➤
        </button>
      </div>
    </div>
  </div>

  <!-- 退出確認モーダル -->
  <div id="modal-leave" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center hidden">
    <div class="bg-white p-6 rounded-lg shadow-xl text-center max-w-sm w-full relative">
      <h3 class="text-lg font-bold mb-2 text-gray-800">捜索から退出しますか？</h3>
      <p class="text-xs text-gray-500 mb-6">退出すると、地図上からあなたの位置情報が完全に消去され、現在地の送信が停止します。</p>
      <div class="flex space-x-3">
        <button id="btn-cancel-leave" class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded transition duration-200">
          キャンセル
        </button>
        <button id="btn-confirm-leave" class="flex-1 bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded transition duration-200">
          退出する
        </button>
      </div>
    </div>
  </div>

  <!-- ========================================== -->
  <!-- Firebase 連携 & アプリのメインプログラム   -->
  <!-- ========================================== -->
  <script type="module">
    // 📱 【重要】PWA (Service Worker) の登録処理
    // この記述があることで「ホーム画面に追加」が可能になります
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(registration => {
          console.log('ServiceWorker 登録成功:', registration.scope);
        }).catch(err => {
          console.log('ServiceWorker 登録失敗:', err);
        });
      });
    }

    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, setDoc, doc, addDoc, deleteDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // 🚨 【重要】ご自身のFirebase設定に書き換えてください！
    const firebaseConfig = {
      apiKey: "AIzaSyAW2Auv3KzKuT8EXJZaY_2bQzBfvYkn6y4",
  　　authDomain: "rescuemap-a5d3a.firebaseapp.com",
  　　projectId: "rescuemap-a5d3a",
  　　storageBucket: "rescuemap-a5d3a.firebasestorage.app",
  　　messagingSenderId: "1049099260873",
  　　appId: "1:1049099260873:web:9b20c7beb7d5d27ea04e18"
    };

    // Firebaseの初期化
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // グローバル変数
    let map = null;
    let markers = {}; // { userId: L.marker }
    let currentUser = null;
    let currentRole = null; // 'hq' or 'field'
    let operationId = null; 
    let myName = "本部";
    let watchId = null;

    // DOM要素
    const setupScreen = document.getElementById('setup-screen');
    const joinScreen = document.getElementById('join-screen');
    const mapChatScreen = document.getElementById('map-chat-screen');
    const statusBadge = document.getElementById('status-badge');
    const hqTools = document.getElementById('hq-tools');
    const fieldTools = document.getElementById('field-tools');
    const chatMessages = document.getElementById('chat-messages');
    const chatInput = document.getElementById('chat-input');
    
    // URLからOperation IDを取得 (QRコードで参加した場合)
    const urlParams = new URLSearchParams(window.location.search);
    const urlOpId = urlParams.get('op');

    // 初期化処理
    function init() {
      if (urlOpId) {
        // QRコードから来た場合は参加画面を表示
        operationId = urlOpId;
        setupScreen.classList.add('hidden');
        joinScreen.classList.remove('hidden');
      }
    }

    // 匿名ログイン
    async function login() {
      try {
        const userCredential = await signInAnonymously(auth);
        currentUser = userCredential.user;
        return currentUser;
      } catch (error) {
        alert("ログインに失敗しました: " + error.message);
        throw error;
      }
    }

    // 本部として開始
    document.getElementById('btn-start-hq').addEventListener('click', async () => {
      try {
        statusBadge.textContent = "準備中...";
        await login();
        
        // 新しいOperation IDを生成 (ランダムな英数字)
        operationId = Math.random().toString(36).substring(2, 8).toUpperCase();
        currentRole = 'hq';
        myName = "本部";
        
        // 画面切り替え
        setupScreen.classList.add('hidden');
        mapChatScreen.classList.remove('hidden');
        hqTools.classList.remove('hidden');
        statusBadge.textContent = "本部運用中";
        statusBadge.classList.replace('bg-gray-500', 'bg-blue-600');
        
        initMap();
        startListening();
        
        // QRコードを表示
        showQRCode();
        
        addChatMessage("システム", `新規オペレーション [${operationId}] を開始しました。`, "system");
      } catch (e) {
        console.error(e);
      }
    });

    // 現場隊員として参加
    document.getElementById('btn-join').addEventListener('click', async () => {
      const nameInput = document.getElementById('input-name').value.trim();
      if (!nameInput) {
        alert("氏名またはコールサインを入力してください。");
        return;
      }
      
      try {
        document.getElementById('btn-join').textContent = "接続中...";
        await login();
        
        currentRole = 'field';
        myName = nameInput;
        const phone = document.getElementById('input-phone').value.trim();
        
        joinScreen.classList.add('hidden');
        mapChatScreen.classList.remove('hidden');
        fieldTools.classList.remove('hidden');
        statusBadge.textContent = "現場活動中";
        statusBadge.classList.replace('bg-gray-500', 'bg-green-600');
        
        initMap();
        startListening();
        startGPS(phone);
        
        addChatMessage("システム", `${myName} がネットワークに参加しました。`, "system");
      } catch (e) {
        console.error(e);
        document.getElementById('btn-join').textContent = "現場に合流する";
      }
    });

    // 地図の初期化 (Leaflet)
    function initMap() {
      // 初期位置 (日本全体)
      map = L.map('map').setView([35.6895, 139.6917], 5);
      
      // 国土地理院地図を使用
      L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
        attribution: "<a href='https://maps.gsi.go.jp/development/ichiran.html' target='_blank'>地理院タイル</a>"
      }).addTo(map);

      // 本部の場合は現在地を取得してズーム
      if (currentRole === 'hq') {
        navigator.geolocation.getCurrentPosition(pos => {
          map.setView([pos.coords.latitude, pos.coords.longitude], 15);
        }, () => {
          // エラー時はデフォルト位置
        });
      }
    }

    // GPSトラッキング開始 (現場用)
    function startGPS(phone) {
      if (!navigator.geolocation) {
        alert("このブラウザはGPSに対応していません。");
        return;
      }

      watchId = navigator.geolocation.watchPosition(
        async (position) => {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          
          // 初回だけ自分の位置にズーム
          if (!markers[currentUser.uid]) {
            map.setView([lat, lng], 16);
          }

          // Firestoreに位置を保存
          try {
            await setDoc(doc(db, "operations", operationId, "locations", currentUser.uid), {
              name: myName,
              phone: phone || "",
              lat: lat,
              lng: lng,
              timestamp: serverTimestamp()
            });
          } catch (e) {
            console.error("位置情報の送信エラー", e);
          }
        },
        (error) => {
          console.warn('GPSエラー:', error.message);
        },
        { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
      );
    }

    // データのリアルタイム受信開始
    function startListening() {
      // 1. 位置情報のリスナー
      const locationsRef = collection(db, "operations", operationId, "locations");
      onSnapshot(locationsRef, (snapshot) => {
        updateMembersList(snapshot.docs); // 本部用リスト更新
        
        snapshot.docChanges().forEach((change) => {
          const data = change.doc.data();
          const uid = change.doc.id;
          
          if (change.type === "added" || change.type === "modified") {
            // マーカー更新
            if (markers[uid]) {
              markers[uid].setLatLng([data.lat, data.lng]);
            } else {
              // 新規マーカー作成
              const iconColor = uid === currentUser.uid ? 'green' : 'blue';
              const markerHtml = `
                <div style="background-color: ${iconColor}; color: white; padding: 2px 5px; border-radius: 5px; font-size: 10px; white-space: nowrap; border: 1px solid white; box-shadow: 0 0 3px rgba(0,0,0,0.5);">
                  ${data.name}
                </div>
              `;
              const customIcon = L.divIcon({
                className: 'custom-div-icon',
                html: markerHtml,
                iconSize: [0, 0],
                iconAnchor: [15, 25] // ピンの先端を合わせる
              });
              
              markers[uid] = L.marker([data.lat, data.lng], {icon: customIcon}).addTo(map);
            }
          }
          if (change.type === "removed") {
            if (markers[uid]) {
              map.removeLayer(markers[uid]);
              delete markers[uid];
            }
          }
        });
      });

      // 2. チャットのリスナー
      const chatRef = collection(db, "operations", operationId, "chat");
      const chatQuery = query(chatRef, orderBy("timestamp", "asc"));
      
      onSnapshot(chatQuery, (snapshot) => {
        snapshot.docChanges().forEach((change) => {
          if (change.type === "added") {
            const data = change.doc.data();
            const type = data.senderId === currentUser.uid ? 'me' : (data.senderId === 'system' ? 'system' : 'other');
            addChatMessage(data.senderName, data.text, type);
          }
        });
      });
    }

    // チャット送信処理
    async function sendChat() {
      const text = chatInput.value.trim();
      if (!text) return;
      
      chatInput.value = ""; // クリア
      
      try {
        await addDoc(collection(db, "operations", operationId, "chat"), {
          senderId: currentUser.uid,
          senderName: myName,
          text: text,
          timestamp: serverTimestamp()
        });
      } catch (e) {
        console.error("チャット送信エラー", e);
        alert("送信に失敗しました");
      }
    }
    document.getElementById('btn-send-chat').addEventListener('click', sendChat);
    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendChat();
    });

    // チャットUIへの描画
    function addChatMessage(name, text, type) {
      const div = document.createElement('div');
      
      if (type === 'system') {
        div.className = "text-center text-xs text-gray-500 my-1";
        div.textContent = text;
      } else if (type === 'me') {
        div.className = "flex flex-col items-end";
        div.innerHTML = `
          <span class="text-[10px] text-gray-500">${name}</span>
          <div class="bg-blue-500 text-white p-2 rounded-lg rounded-tr-none max-w-[80%] text-sm shadow">${text}</div>
        `;
      } else {
        div.className = "flex flex-col items-start";
        div.innerHTML = `
          <span class="text-[10px] text-gray-500">${name}</span>
          <div class="bg-gray-200 text-gray-800 p-2 rounded-lg rounded-tl-none max-w-[80%] text-sm shadow">${text}</div>
        `;
      }
      
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight; // 一番下へスクロール
    }

    // 隊員一覧の更新 (本部のみ)
    function updateMembersList(docs) {
      if (currentRole !== 'hq') return;
      const listDiv = document.getElementById('members-list');
      listDiv.innerHTML = '';
      
      docs.forEach(docSnap => {
        const data = docSnap.data();
        const item = document.createElement('div');
        item.className = "p-2 border border-gray-200 rounded flex justify-between items-center bg-gray-50";
        item.innerHTML = `
          <div>
            <div class="font-bold text-gray-800">${data.name}</div>
            <div class="text-xs text-gray-500">${data.phone || '電話番号なし'}</div>
          </div>
        `;
        listDiv.appendChild(item);
      });
    }

    // === UI制御関連 ===
    
    // QRコード表示 (本部)
    function showQRCode() {
      const modal = document.getElementById('modal-qr');
      const container = document.getElementById('qrcode-container');
      const urlDisplay = document.getElementById('share-url');
      
      container.innerHTML = ""; // クリア
      
      // 現在のURLにパラメータをつけてQRコード化
      const baseUrl = window.location.href.split('?')[0];
      const joinUrl = `${baseUrl}?op=${operationId}`;
      
      new QRCode(container, {
        text: joinUrl,
        width: 150,
        height: 150
      });
      
      urlDisplay.textContent = joinUrl;
      modal.classList.remove('hidden');
    }

    document.getElementById('btn-show-qr').addEventListener('click', showQRCode);
    document.getElementById('btn-close-qr').addEventListener('click', () => {
      document.getElementById('modal-qr').classList.add('hidden');
    });

    // 隊員一覧の開閉 (本部)
    const membersPanel = document.getElementById('members-panel');
    document.getElementById('btn-toggle-members').addEventListener('click', () => {
      membersPanel.classList.toggle('translate-x-full');
    });
    document.getElementById('btn-close-members').addEventListener('click', () => {
      membersPanel.classList.add('translate-x-full');
    });

    // 現在地に戻る (現場)
    document.getElementById('btn-my-location').addEventListener('click', () => {
      if (markers[currentUser.uid]) {
        map.setView(markers[currentUser.uid].getLatLng(), 16);
      }
    });

    // 退出処理 (現場)
    const modalLeave = document.getElementById('modal-leave');
    document.getElementById('btn-leave').addEventListener('click', () => {
      modalLeave.classList.remove('hidden');
    });
    document.getElementById('btn-cancel-leave').addEventListener('click', () => {
      modalLeave.classList.add('hidden');
    });
    document.getElementById('btn-confirm-leave').addEventListener('click', async () => {
      // 1. GPSトラッキング停止
      if (watchId !== null) navigator.geolocation.clearWatch(watchId);
      // 2. データベースから自分の位置を削除
      try {
        await deleteDoc(doc(db, "operations", operationId, "locations", currentUser.uid));
        // 3. チャットに退出メッセージを残す
        await addDoc(collection(db, "operations", operationId, "chat"), {
          senderId: 'system',
          senderName: 'システム',
          text: `${myName} が退出しました。`,
          timestamp: serverTimestamp()
        });
      } catch (e) {
        console.error("退出エラー", e);
      }
      // 4. 画面をリロードして初期状態に戻す
      window.location.href = window.location.href.split('?')[0];
    });

    // 初期化実行
    init();

  </script>
</body>
</html>
