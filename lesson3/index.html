  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; }
    @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
    .animate-float { animation: float 3s ease-in-out infinite; }
  </style>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- アイコン群 ---
    const Activity = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>);
    const AlertTriangle = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>);
    const Clock = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>);
    const CheckCircle = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>);
    const XCircle = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>);
    const ArrowLeft = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>);
    const Settings = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z"></path></svg>);
    const ListIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>);
    const Volume2 = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>);
    const VolumeX = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>);
    const Plus = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>);
    const Trash2 = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2-2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>);
    const Copy = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>);
    const Sparkles = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path><path d="M5 3v4"></path><path d="M19 17v4"></path><path d="M3 5h4"></path><path d="M17 19h4"></path></svg>);
    const Download = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>);
    const Share = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>);

    // --- デフォルトシナリオ群 ---
    const SCENARIO_DB = [
      {
        id: 'burn', title: '爆発事故 / 多発外傷・気道熱傷', isCustom: false,
        description: '【事案発生】爆発事故現場に到着。傷病者は顔面に熱傷あり。嗄声（させい）を認める。活動開始！',
        goalTime: 600, initialHp: 100,
        actions: [
          { id: 'safety', name: '現場の安全確認・感染防御', targetTime: null, penalty: 10 },
          { id: 'primary', name: '初期評価 (ABCDE)', targetTime: 60, penalty: 20 },
          { id: 'oxygen', name: '酸素投与 (10L/分)', targetTime: 60, penalty: 10 },
          { id: 'bvm', name: 'BVM換気', targetTime: null, penalty: 10 },
          { id: 'intubation', name: '気管挿管', targetTime: 180, penalty: 20 },
          { id: 'surgical_airway', name: '外科的気道確保', targetTime: null, penalty: 10 },
          { id: 'iv', name: '静脈路確保・採血', targetTime: null, penalty: 10 },
          { id: 'io', name: '骨髄路確保 (IO)', targetTime: null, penalty: 10 },
          { id: 'fluid', name: '急速輸液', targetTime: null, penalty: 10 },
          { id: 'chest_tube', name: '胸腔ドレナージ', targetTime: null, penalty: 10 },
          { id: 'pelvic_binder', name: '骨盤固定', targetTime: null, penalty: 10 },
          { id: 'txa', name: 'トラネキサム酸投与', targetTime: null, penalty: 10 },
          { id: 'adrenaline', name: 'アドレナリン投与', targetTime: null, penalty: 10 },
          { id: 'defib', name: '除細動', targetTime: null, penalty: 20 },
          { id: 'thoracotomy', name: '開胸心臓マッサージ', targetTime: null, penalty: 10 },
        ],
        audioEvents: [
          { time: 5, text: 'あつい！顔がすごく痛いです！' },
          { time: 60, text: '息が…苦しいです…。声が、かすれます…。' },
          { time: 180, text: 'ゼー…ゼー…（呼吸が極めて苦しい様子）' },
        ]
      },
      {
        id: 'anaphylaxis', title: 'アナフィラキシーショック', isCustom: false,
        description: '【事案発生】飲食店内で食事中の客が突然の呼吸困難と全身の蕁麻疹を訴え倒れた。血圧低下あり。活動開始！',
        goalTime: 600, initialHp: 80,
        actions: [
          { id: 'safety', name: '現場の安全確認・感染防御', targetTime: null, penalty: 10 },
          { id: 'primary', name: '初期評価 (ABCDE)', targetTime: 60, penalty: 20 },
          { id: 'adrenaline', name: 'アドレナリン筋注 (0.3mg)', targetTime: 180, penalty: 20 },
          { id: 'oxygen', name: '酸素投与 (10L/分)', targetTime: 120, penalty: 10 },
          { id: 'iv', name: '静脈路確保・輸液', targetTime: 300, penalty: 10 },
          { id: 'antihistamine', name: '抗ヒスタミン薬投与', targetTime: null, penalty: 10 },
          { id: 'steroid', name: 'ステロイド投与', targetTime: null, penalty: 10 },
          { id: 'intubation', name: '気管挿管 (気道浮腫増悪時)', targetTime: null, penalty: 10 },
        ],
        audioEvents: [
          { time: 5, text: '急に、息ができない…苦しい…' },
          { time: 60, text: '体中が、痒くて、熱いです…' },
          { time: 150, text: '目の前が、暗くなってきました…' },
        ]
      },
      {
        id: 'stroke', title: '脳卒中 (CPSS評価)', isCustom: false,
        description: '【事案発生】家族からの通報。70代男性が突然呂律が回らなくなり、右半身に力が入らない。活動開始！',
        goalTime: 600, initialHp: 100,
        actions: [
          { id: 'safety', name: '現場の安全確認・感染防御', targetTime: null, penalty: 10 },
          { id: 'primary', name: '初期評価 (ABCDE)', targetTime: 60, penalty: 10 },
          { id: 'cpss', name: 'CPSS評価 (顔面・上肢・言語)', targetTime: 180, penalty: 20 },
          { id: 'onset_time', name: '最終健常時刻（発症時刻）の確認', targetTime: 240, penalty: 20 },
          { id: 'glucose_check', name: '血糖値測定（低血糖の除外）', targetTime: 300, penalty: 10 },
          { id: 'oxygen', name: '酸素投与（SpO2低下時）', targetTime: null, penalty: 10 },
          { id: 'iv', name: '静脈路確保', targetTime: null, penalty: 10 },
          { id: 'hospital', name: '血栓溶解療法可能施設への早期連絡', targetTime: 420, penalty: 10 },
        ],
        audioEvents: [
          { time: 5, text: 'あー、うー（呂律が回らない様子）' },
          { time: 60, text: '右の手足が、痺れています…' },
          { time: 120, text: '言葉が、うまく出ません…' },
        ]
      }
    ];

    // ==========================================
    // コンポーネント: シナリオジェネレーター（作成画面）
    // ==========================================
    function ScenarioGenerator({ onSave, onCancel }) {
      const [title, setTitle] = useState('');
      const [goalTimeStr, setGoalTimeStr] = useState('10');
      const [description, setDescription] = useState('');
      const [actions, setActions] = useState([{ id: `action_${Date.now()}_1`, name: '', targetTimeStr: '', penalty: 10 }]);
      const [audioEvents, setAudioEvents] = useState([]);

      const addAction = () => setActions([...actions, { id: `action_${Date.now()}`, name: '', targetTimeStr: '', penalty: 10 }]);
      const removeAction = (id) => setActions(actions.filter(a => a.id !== id));
      const updateAction = (id, field, value) => setActions(actions.map(a => a.id === id ? { ...a, [field]: value } : a));

      const addAudioEvent = () => setAudioEvents([...audioEvents, { id: `audio_${Date.now()}`, timeStr: '', text: '' }]);
      const removeAudioEvent = (id) => setAudioEvents(audioEvents.filter(a => a.id !== id));
      const updateAudioEvent = (id, field, value) => setAudioEvents(audioEvents.map(a => a.id === id ? { ...a, [field]: value } : a));

      const handleSaveClick = () => {
        if (!title.trim()) { alert('シナリオ名を入力してください'); return; }
        const newScenario = {
          id: `custom_${Date.now()}`,
          title: title.trim(),
          description: description || '【事案発生】活動開始！',
          goalTime: (parseInt(goalTimeStr, 10) || 10) * 60,
          initialHp: 100,
          isCustom: true,
          actions: actions.filter(a => a.name.trim() !== '').map(a => ({
            id: a.id,
            name: a.name.trim(),
            targetTime: a.targetTimeStr ? parseInt(a.targetTimeStr, 10) : null,
            penalty: a.penalty
          })),
          audioEvents: audioEvents.filter(a => a.text.trim() !== '' && a.timeStr !== '').map(a => ({
            time: parseInt(a.timeStr, 10) || 0,
            text: a.text.trim()
          }))
        };
        onSave(newScenario);
      };

      return (
        <div className="bg-gradient-to-br from-blue-100 via-purple-100 to-pink-100 min-h-screen p-4 md:p-8 flex justify-center pb-32">
          <div className="max-w-4xl w-full">
            <button onClick={onCancel} className="mb-6 flex items-center text-gray-700 bg-white/70 px-4 py-2 rounded-full hover:bg-white shadow-sm transition-colors">
              <ArrowLeft className="w-5 h-5 mr-1"/> 戻る
            </button>

            <div className="text-center mb-10 relative">
              <h1 className="text-3xl md:text-5xl font-extrabold mb-4 animate-float text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-red-500 to-yellow-500 drop-shadow-sm">
                ✨ オリジナルシナリオ作成 ✨
              </h1>
              <p className="text-gray-800 font-bold bg-white/70 inline-block px-6 py-2.5 rounded-full shadow-md text-sm md:text-base">
                フォームを埋めて保存するだけで、アプリに自作シナリオを追加できます🚑💨
              </p>
            </div>

            {/* 基本情報 */}
            <div className="bg-white rounded-2xl shadow-lg overflow-hidden mb-8 border-4 border-blue-100">
              <div className="bg-gradient-to-r from-blue-600 to-cyan-500 p-4"><h2 className="text-2xl font-extrabold text-white flex items-center"><span className="bg-white text-blue-600 rounded-full w-8 h-8 flex items-center justify-center mr-3">1</span>基本情報</h2></div>
              <div className="p-6 md:p-8 space-y-6 bg-blue-50/30">
                <div><label className="block text-sm font-extrabold text-blue-800 mb-2">シナリオのタイトル</label><input type="text" value={title} onChange={e => setTitle(e.target.value)} placeholder="例：交通事故 / 緊張性気胸" className="w-full border-2 border-blue-200 rounded-xl p-3 focus:ring-4 focus:ring-blue-300 font-bold text-gray-800 outline-none" /></div>
                <div><label className="block text-sm font-extrabold text-blue-800 mb-2">目標活動時間</label><div className="flex items-center"><input type="number" value={goalTimeStr} onChange={e => setGoalTimeStr(e.target.value)} className="w-32 border-2 border-blue-200 rounded-xl p-3 focus:ring-4 focus:ring-blue-300 text-xl font-extrabold text-blue-600 text-center outline-none" /><span className="ml-3 text-blue-800 font-bold">分</span></div></div>
                <div><label className="block text-sm font-extrabold text-blue-800 mb-2">想定状況 (プロローグ)</label><textarea value={description} onChange={e => setDescription(e.target.value)} placeholder="【事案発生】現場に到着。傷病者は..." className="w-full border-2 border-blue-200 rounded-xl p-4 focus:ring-4 focus:ring-blue-300 h-28 text-gray-800 outline-none"></textarea></div>
              </div>
            </div>

            {/* 評価項目 */}
            <div className="bg-white rounded-2xl shadow-lg overflow-hidden mb-8 border-4 border-orange-100">
              <div className="bg-gradient-to-r from-orange-500 to-yellow-400 p-4"><h2 className="text-2xl font-extrabold text-white flex items-center"><span className="bg-white text-orange-500 rounded-full w-8 h-8 flex items-center justify-center mr-3">2</span>評価項目 (処置・手技)</h2></div>
              <div className="p-6 md:p-8 bg-orange-50/30">
                <div className="space-y-4 mb-6">
                  {actions.map((action, index) => (
                    <div key={action.id} className="flex flex-wrap md:flex-nowrap gap-3 items-center bg-white p-4 rounded-xl border-2 border-orange-200 shadow-sm relative group">
                      <div className="absolute -left-3 -top-3 bg-orange-500 text-white w-6 h-6 rounded-full flex items-center justify-center font-bold text-xs shadow-md border-2 border-white">{index + 1}</div>
                      <div className="w-full md:w-5/12"><label className="block text-xs font-extrabold text-orange-700 mb-1">手技名</label><input type="text" value={action.name} onChange={e => updateAction(action.id, 'name', e.target.value)} placeholder="例：現場の安全確認" className="w-full border-2 border-orange-200 rounded-lg p-2 font-bold text-gray-800 outline-none focus:ring-2 focus:ring-orange-400" /></div>
                      <div className="w-[45%] md:w-3/12"><label className="block text-xs font-extrabold text-orange-700 mb-1">目標時間 (秒)</label><input type="number" value={action.targetTimeStr} onChange={e => updateAction(action.id, 'targetTimeStr', e.target.value)} placeholder="なし" className="w-full border-2 border-orange-200 rounded-lg p-2 font-bold text-gray-800 outline-none focus:ring-2 focus:ring-orange-400 text-center" /></div>
                      <div className="w-[45%] md:w-3/12"><label className="block text-xs font-extrabold text-orange-700 mb-1">未実施の減点</label><div className="flex items-center bg-white border-2 border-red-200 rounded-lg"><span className="text-red-500 font-extrabold pl-2">-</span><select value={action.penalty} onChange={e => updateAction(action.id, 'penalty', parseInt(e.target.value))} className="w-full bg-transparent p-2 outline-none text-red-600 font-extrabold cursor-pointer">{[...Array(21).keys()].map(n => <option key={n} value={n}>{n}</option>)}</select></div></div>
                      <div className="w-full md:w-1/12 flex justify-end"><button onClick={() => removeAction(action.id)} className="text-orange-300 hover:text-red-500 p-2"><Trash2 className="w-5 h-5" /></button></div>
                    </div>
                  ))}
                </div>
                <button onClick={addAction} className="w-full md:w-auto flex items-center justify-center font-extrabold text-orange-600 bg-white hover:bg-orange-50 px-6 py-3 rounded-xl border-2 border-orange-300 border-dashed shadow-sm"><Plus className="w-5 h-5 mr-2" /> 評価項目を追加する</button>
              </div>
            </div>

            {/* 音声 */}
            <div className="bg-white rounded-2xl shadow-lg overflow-hidden mb-12 border-4 border-purple-100">
              <div className="bg-gradient-to-r from-purple-600 to-pink-500 p-4"><h2 className="text-2xl font-extrabold text-white flex items-center"><span className="bg-white text-purple-600 rounded-full w-8 h-8 flex items-center justify-center mr-3">3</span>患者の声・容態変化 <span className="text-sm ml-3 bg-white/20 px-2 rounded-full">オプション</span></h2></div>
              <div className="p-6 md:p-8 bg-purple-50/30">
                <div className="space-y-4 mb-6">
                  {audioEvents.map((event, index) => (
                    <div key={event.id} className="flex flex-wrap md:flex-nowrap gap-3 items-center bg-white p-4 rounded-xl border-2 border-purple-200 shadow-sm relative">
                      <div className="absolute -left-3 -top-3 bg-purple-500 text-white w-6 h-6 rounded-full flex items-center justify-center font-bold text-xs shadow-md border-2 border-white">{index + 1}</div>
                      <div className="w-[30%] md:w-1/4"><label className="block text-xs font-extrabold text-purple-700 mb-1">発生時間 (秒)</label><input type="number" value={event.timeStr} onChange={e => updateAudioEvent(event.id, 'timeStr', e.target.value)} placeholder="例: 60" className="w-full border-2 border-purple-200 rounded-lg p-2 font-bold text-gray-800 outline-none text-center" /></div>
                      <div className="w-[65%] md:w-3/4"><label className="block text-xs font-extrabold text-purple-700 mb-1">読み上げるセリフ</label><input type="text" value={event.text} onChange={e => updateAudioEvent(event.id, 'text', e.target.value)} placeholder="例：息が苦しいです…" className="w-full border-2 border-purple-200 rounded-lg p-2 font-bold text-gray-800 outline-none" /></div>
                      <div className="w-full md:w-auto flex justify-end"><button onClick={() => removeAudioEvent(event.id)} className="text-purple-300 hover:text-red-500 p-2"><Trash2 className="w-5 h-5" /></button></div>
                    </div>
                  ))}
                </div>
                <button onClick={addAudioEvent} className="w-full md:w-auto flex items-center justify-center font-extrabold text-purple-600 bg-white hover:bg-purple-50 px-6 py-3 rounded-xl border-2 border-purple-300 border-dashed shadow-sm"><Plus className="w-5 h-5 mr-2" /> セリフを追加する</button>
              </div>
            </div>

            <div className="text-center relative z-10">
              <button onClick={handleSaveClick} className="px-8 py-5 w-full md:w-auto font-extrabold text-white text-xl rounded-full bg-gradient-to-r from-green-500 to-emerald-600 shadow-lg hover:scale-105 transition-transform flex items-center justify-center mx-auto">
                <Sparkles className="w-6 h-6 mr-2 animate-pulse" /> 💾 アプリに保存して戻る <Sparkles className="w-6 h-6 ml-2 animate-pulse" />
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // メインアプリケーション
    // ==========================================
    function App() {
      const [appMode, setAppMode] = useState('menu'); // menu, play, generate
      const [customScenarios, setCustomScenarios] = useState([]);
      const [activeScenarioId, setActiveScenarioId] = useState(SCENARIO_DB[0].id);
      const [editedScenarios, setEditedScenarios] = useState({}); // メニューでの一時的な編集用
      
      const [gameState, setGameState] = useState('ready');
      const [timeElapsed, setTimeElapsed] = useState(0);
      const [hp, setHp] = useState(100);
      const [logs, setLogs] = useState([]);
      const [actions, setActions] = useState([]);
      const [isAudioEnabled, setIsAudioEnabled] = useState(true);

      // 初期ロード時にLocalStorageから自作シナリオを読み込む
      useEffect(() => {
        const saved = localStorage.getItem('medical_rally_custom_scenarios');
        if (saved) {
          try { setCustomScenarios(JSON.parse(saved)); } catch(e) { console.error(e); }
        }
      }, []);

      const allScenarios = [...SCENARIO_DB, ...customScenarios];
      // 選択中のシナリオ（編集が加わっていればそれを優先）
      const baseScenario = allScenarios.find(s => s.id === activeScenarioId) || SCENARIO_DB[0];
      const activeScenario = editedScenarios[activeScenarioId] || baseScenario;

      // 自作シナリオの保存
      const handleSaveCustomScenario = (newScenario) => {
        const newCustoms = [...customScenarios, newScenario];
        setCustomScenarios(newCustoms);
        localStorage.setItem('medical_rally_custom_scenarios', JSON.stringify(newCustoms));
        setActiveScenarioId(newScenario.id);
        setAppMode('menu');
      };

      // 自作シナリオの削除
      const handleDeleteCustomScenario = (id) => {
        if (!confirm('このマイシナリオを削除しますか？')) return;
        const newCustoms = customScenarios.filter(s => s.id !== id);
        setCustomScenarios(newCustoms);
        localStorage.setItem('medical_rally_custom_scenarios', JSON.stringify(newCustoms));
        if (activeScenarioId === id) setActiveScenarioId(SCENARIO_DB[0].id);
      };

      // シナリオの共有（エクスポート）
      const handleExport = (scenario) => {
        const jsonStr = JSON.stringify(scenario);
        const encoded = btoa(encodeURIComponent(jsonStr)); // Base64エンコードして1行の文字列にする
        navigator.clipboard.writeText(encoded).then(() => {
          alert('📤 共有コードをコピーしました！\nLINEやメールに貼り付けて、他のメンバーに送ることができます。');
        }).catch(err => alert('コピーに失敗しました。'));
      };

      // シナリオの読み込み（インポート）
      const handleImport = () => {
        const code = prompt('📥 共有コードをここに貼り付けてください：');
        if (!code) return;
        try {
          const jsonStr = decodeURIComponent(atob(code));
          const scenario = JSON.parse(jsonStr);
          if (scenario && scenario.id && scenario.actions) {
            scenario.id = `custom_${Date.now()}`; // IDを振り直す
            scenario.isCustom = true;
            handleSaveCustomScenario(scenario);
            alert('✨ シナリオの読み込みに成功しました！');
          } else {
            alert('❌ 不正なコードです。');
          }
        } catch(e) {
          alert('❌ コードの読み込みに失敗しました。正しくコピーできているか確認してください。');
        }
      };

      // メニューでの一時編集処理
      const handleDescriptionChange = (e) => {
        setEditedScenarios({ ...editedScenarios, [activeScenarioId]: { ...activeScenario, description: e.target.value } });
      };
      const handleScenarioTargetTimeChange = (actionId, newTimeStr) => {
        const newActions = activeScenario.actions.map(action => {
          if (action.id === actionId) {
            if (newTimeStr === '') return { ...action, targetTime: null };
            const val = parseInt(newTimeStr, 10);
            return { ...action, targetTime: isNaN(val) ? null : val };
          }
          return action;
        });
        setEditedScenarios({ ...editedScenarios, [activeScenarioId]: { ...activeScenario, actions: newActions } });
      };
      const handleScenarioPenaltyChange = (actionId, newPenalty) => {
        const newActions = activeScenario.actions.map(action => action.id === actionId ? { ...action, penalty: Number(newPenalty) } : action);
        setEditedScenarios({ ...editedScenarios, [activeScenarioId]: { ...activeScenario, actions: newActions } });
      };

      // シミュレーション準備
      const handleStartSimulation = () => {
        setActions(activeScenario.actions.map(a => ({ ...a, penalty: a.penalty !== undefined ? a.penalty : 10, status: 'pending', executeTime: null, autoDeducted: false })));
        setHp(activeScenario.initialHp);
        setGameState('ready');
        setTimeElapsed(0);
        setLogs([]);
        if (window.speechSynthesis) window.speechSynthesis.cancel();
        setAppMode('play');
      };

      // === 以下、プレイ中のロジック ===
      const startGame = () => {
        if (window.speechSynthesis) window.speechSynthesis.cancel();
        setGameState('playing');
        setTimeElapsed(0);
        setHp(activeScenario.initialHp);
        setLogs([{ time: 0, message: activeScenario.description, type: 'warning' }]);
        setActions(prevActions => prevActions.map(a => ({ ...a, status: 'pending', executeTime: null, autoDeducted: false })));
      };

      const handleTargetTimeChange = (id, newTimeStr) => {
        setActions((prevActions) => prevActions.map((action) => {
          if (action.id === id) {
            if (newTimeStr === '') return { ...action, targetTime: null };
            const val = parseInt(newTimeStr, 10);
            return { ...action, targetTime: isNaN(val) ? null : val };
          }
          return action;
        }));
      };

      const handlePenaltyChange = (id, newPenalty) => {
        setActions((prevActions) => prevActions.map((action) => action.id === id ? { ...action, penalty: Number(newPenalty) } : action));
      };

      useEffect(() => {
        let timer;
        if (appMode === 'play' && gameState === 'playing') {
          timer = setInterval(() => {
            setTimeElapsed((prevTime) => {
              const newTime = prevTime + 1;
              // カスタムシナリオの場合はデフォルトのHP減衰を適用しない（HPは使わない）
              if(activeScenario.calculateDamage) {
                setHp(prev => Number(activeScenario.calculateDamage(newTime, prev, actions).toFixed(1)));
              }
              if (newTime >= activeScenario.goalTime) {
                setGameState('clear');
                addLog('目標時間を達成しました。活動終了！', 'success');
              }
              return newTime;
            });
          }, 1000); 
        }
        return () => clearInterval(timer);
      }, [appMode, gameState, actions, activeScenario]);

      useEffect(() => {
        if (gameState !== 'playing') return;
        const audioEvent = activeScenario.audioEvents?.find(event => event.time === timeElapsed);
        if (audioEvent) {
          if (isAudioEnabled && 'speechSynthesis' in window) {
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(audioEvent.text);
            utterance.lang = 'ja-JP'; utterance.rate = 0.85; 
            window.speechSynthesis.speak(utterance);
          }
          addLog(`【患者の声】「${audioEvent.text}」`, 'info');
        }
      }, [timeElapsed, gameState, activeScenario, isAudioEnabled]);

      useEffect(() => {
        if (gameState !== 'playing') return;
        setActions((prevActions) => {
          let isUpdated = false;
          const nextActions = prevActions.map((action) => {
            if (action.targetTime && action.status === 'pending' && !action.autoDeducted && timeElapsed > action.targetTime) {
              isUpdated = true;
              setTimeout(() => addLog(`【時間超過】「${action.name}」の目標時間を過ぎました（自動減点 -5）`, 'error'), 0);
              return { ...action, autoDeducted: true };
            }
            return action;
          });
          return isUpdated ? nextActions : prevActions;
        });
      }, [timeElapsed, gameState]);

      const prevGameStateRef = useRef(gameState);
      useEffect(() => {
        if (prevGameStateRef.current === 'playing' && (gameState === 'clear' || gameState === 'gameover')) {
           const unexecuted = actions.filter(a => a.status === 'pending');
           if(unexecuted.length > 0) {
             setTimeout(() => {
               addLog(`【最終評価】活動終了時の未実施項目（保留分）を合算しました。`, 'warning');
               unexecuted.forEach(action => addLog(`【未実施】「${action.name}」（減点 -${action.penalty}）`, 'error'));
             }, 500);
           }
        }
        prevGameStateRef.current = gameState;
      }, [gameState, actions]);

      const handleAction = (id, resultStatus) => {
        if (gameState !== 'playing') return;
        setActions((prevActions) => 
          prevActions.map((action) => {
            if (action.id === id && action.status === 'pending') {
              if (resultStatus === 'success') {
                const isLate = action.targetTime && timeElapsed > action.targetTime;
                addLog(`${formatTime(timeElapsed)}: 「${action.name}」を実施しました。`, isLate ? 'warning' : 'info');
              } else if (resultStatus === 'failed') {
                addLog(`【減点】「${action.name}」が出来ませんでした（減点 -${action.penalty}）`, 'error');
              }
              return { ...action, status: resultStatus, executeTime: timeElapsed };
            }
            return action;
          })
        );
      };

      const addLog = (message, type = 'default') => setLogs((prev) => [{ time: timeElapsed, message, type }, ...prev]);
      const formatTime = (sec) => `${Math.floor(sec / 60).toString().padStart(2, '0')}:${(sec % 60).toString().padStart(2, '0')}`;

      // ==========================================
      // レンダリング (ルーティング)
      // ==========================================

      if (appMode === 'generate') {
        return <ScenarioGenerator onSave={handleSaveCustomScenario} onCancel={() => setAppMode('menu')} />;
      }

      if (appMode === 'menu') {
        return (
          <div className="min-h-screen bg-gray-100 p-4 md:p-8 font-sans">
            <div className="max-w-6xl mx-auto">
              <div className="mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                  <h1 className="text-3xl font-bold text-gray-800 flex items-center"><Settings className="w-8 h-8 mr-3 text-blue-600" /> メディカルラリー 評価ツール</h1>
                  <p className="text-gray-600 mt-2">評価に使用するシナリオを選択してください。</p>
                </div>
                <div className="flex gap-2">
                  <button onClick={() => setAppMode('generate')} className="flex items-center bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg shadow-md transition-colors text-sm">
                    <Plus className="w-5 h-5 mr-1"/> 新しいシナリオを作成
                  </button>
                  <button onClick={handleImport} className="flex items-center bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-bold py-2 px-4 rounded-lg shadow-sm transition-colors text-sm">
                    <Download className="w-5 h-5 mr-1"/> 読み込む
                  </button>
                </div>
              </div>

              <div className="flex flex-col md:flex-row gap-6">
                {/* 左側：リスト */}
                <div className="w-full md:w-1/3 bg-white rounded-xl shadow p-4 h-[75vh] overflow-y-auto">
                  
                  <h2 className="font-bold text-gray-700 mb-3 border-b pb-2 flex items-center"><ListIcon className="w-5 h-5 mr-2 text-gray-500"/> デフォルトシナリオ</h2>
                  <div className="space-y-2 mb-6">
                    {SCENARIO_DB.map((scenario) => (
                      <button key={scenario.id} onClick={() => setActiveScenarioId(scenario.id)} className={`w-full text-left p-3 rounded-lg border transition-all ${activeScenarioId === scenario.id ? 'border-blue-500 bg-blue-50 shadow-sm' : 'border-gray-200 hover:bg-gray-50'}`}>
                        <div className="font-bold text-gray-800">{scenario.title}</div>
                        <div className="text-xs text-gray-500 mt-1">評価項目数: {scenario.actions.length}件</div>
                      </button>
                    ))}
                  </div>

                  <h2 className="font-bold text-gray-700 mb-3 border-b pb-2 flex items-center text-purple-700"><Sparkles className="w-5 h-5 mr-2"/> マイシナリオ (自作)</h2>
                  {customScenarios.length === 0 ? (
                    <p className="text-xs text-gray-400 text-center py-4 bg-gray-50 rounded border border-dashed border-gray-300">まだ自作シナリオはありません</p>
                  ) : (
                    <div className="space-y-2">
                      {customScenarios.map((scenario) => (
                        <button key={scenario.id} onClick={() => setActiveScenarioId(scenario.id)} className={`w-full text-left p-3 rounded-lg border transition-all ${activeScenarioId === scenario.id ? 'border-purple-500 bg-purple-50 shadow-sm' : 'border-purple-200 hover:bg-purple-50'}`}>
                          <div className="font-bold text-purple-900">{scenario.title}</div>
                          <div className="text-xs text-purple-600 mt-1">評価項目数: {scenario.actions.length}件</div>
                        </button>
                      ))}
                    </div>
                  )}
                </div>

                {/* 右側：プレビュー */}
                <div className="w-full md:w-2/3 bg-white rounded-xl shadow flex flex-col overflow-hidden h-[75vh]">
                  <div className={`p-4 shrink-0 flex justify-between items-center ${activeScenario.isCustom ? 'bg-purple-800' : 'bg-gray-800'} text-white`}>
                    <div>
                      <h2 className="text-xl font-bold">{activeScenario.title} {activeScenario.isCustom && <span className="bg-purple-500 text-xs px-2 py-0.5 rounded ml-2">マイシナリオ</span>}</h2>
                      <p className="text-sm text-gray-300 mt-1">目標活動時間: {formatTime(activeScenario.goalTime)}</p>
                    </div>
                    {/* 共有・削除ボタン (カスタムのみ) */}
                    {activeScenario.isCustom && (
                      <div className="flex gap-2">
                        <button onClick={() => handleExport(activeScenario)} className="bg-white/20 hover:bg-white/30 p-2 rounded flex items-center text-sm" title="共有コードをコピー">
                          <Share className="w-4 h-4 mr-1"/> 共有
                        </button>
                        <button onClick={() => handleDeleteCustomScenario(activeScenario.id)} className="bg-red-500/80 hover:bg-red-500 p-2 rounded flex items-center text-sm" title="削除">
                          <Trash2 className="w-4 h-4"/>
                        </button>
                      </div>
                    )}
                  </div>
                  
                  <div className="p-6 overflow-y-auto flex-1 bg-gray-50">
                    <div className="mb-6">
                      <h3 className="text-sm font-bold text-gray-500 mb-2 flex justify-between items-center"><span>想定状況 (プロローグ)</span><span className="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded">※書き換え可能</span></h3>
                      <textarea value={activeScenario.description} onChange={handleDescriptionChange} className="w-full bg-white p-3 rounded border border-gray-300 text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-y min-h-[80px]" />
                    </div>
                    <div>
                      <h3 className="text-sm font-bold text-gray-500 mb-2">設定されている評価項目と目標時間</h3>
                      <div className="bg-white rounded border border-gray-200 overflow-hidden">
                        <table className="w-full text-sm text-left">
                          <thead className="bg-gray-100 text-gray-600">
                            <tr><th className="px-4 py-2 border-b">処置・手技名</th><th className="px-4 py-2 border-b">目標時間 (秒)</th><th className="px-4 py-2 border-b">未実施減点 (配点)</th></tr>
                          </thead>
                          <tbody>
                            {activeScenario.actions.map((action, idx) => (
                              <tr key={idx} className="border-b last:border-0 hover:bg-gray-50">
                                <td className="px-4 py-2">{action.name}</td>
                                <td className="px-4 py-2">
                                  <div className="flex items-center">
                                    <input type="number" min="0" step="10" value={action.targetTime === null ? '' : action.targetTime} onChange={(e) => handleScenarioTargetTimeChange(action.id, e.target.value)} placeholder="なし" className="bg-white border border-gray-300 rounded text-sm font-bold text-gray-700 w-16 text-center py-1 mr-1" />
                                    <span className="text-xs text-gray-500 mr-2">秒</span>
                                    {action.targetTime !== null && action.targetTime >= 0 && <span className="text-xs font-mono text-blue-600 bg-blue-50 px-1.5 py-0.5 rounded border border-blue-100">{formatTime(action.targetTime)}</span>}
                                  </div>
                                </td>
                                <td className="px-4 py-2">
                                  <div className="flex items-center"><span className="text-red-600 font-bold mr-1">-</span><select value={action.penalty !== undefined ? action.penalty : 10} onChange={(e) => handleScenarioPenaltyChange(action.id, e.target.value)} className="bg-white border border-gray-300 rounded text-sm font-bold text-red-600 focus:outline-none focus:ring-2 focus:ring-blue-500 w-16 text-center py-1 cursor-pointer">{[...Array(21).keys()].map(num => <option key={num} value={num}>{num}</option>)}</select></div>
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                  <div className="p-4 bg-white border-t border-gray-200 shrink-0">
                    <button onClick={handleStartSimulation} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition-colors text-lg flex justify-center items-center">
                      このシナリオでラリー評価を開始する
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // --- プレイ画面 ---
      const totalDeduction = actions.reduce((sum, action) => {
        let deduction = 0;
        if (action.status === 'failed') deduction += action.penalty;
        else if ((gameState === 'clear' || gameState === 'gameover') && action.status === 'pending') deduction += action.penalty;
        if (action.autoDeducted && action.status !== 'failed') deduction += 5;
        return sum + deduction;
      }, 0);
      const currentScore = Math.max(0, 100 - totalDeduction); 

      return (
        <div className="min-h-screen bg-gray-100 p-2 sm:p-4 md:p-8 font-sans">
          <div className="max-w-7xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden flex flex-col md:flex-row relative">
            <button onClick={() => { if(window.speechSynthesis) window.speechSynthesis.cancel(); setAppMode('menu'); }} className="absolute top-2 left-2 sm:top-4 sm:left-4 md:top-6 md:left-6 text-gray-500 hover:text-gray-800 bg-white/90 p-2 rounded-full shadow z-20 flex items-center">
              <ArrowLeft className="w-5 h-5 sm:mr-1" /> <span className="text-sm font-bold hidden md:inline">シナリオ選択に戻る</span>
            </button>

            {/* 左：評価 */}
            <div className="w-full md:w-2/3 p-3 pt-14 sm:p-4 sm:pt-16 md:p-6 md:pt-16 border-b md:border-r border-gray-200 flex flex-col h-[55vh] md:h-[90vh]">
              <div className="mb-3 md:mb-4 flex justify-between items-center border-b pb-2 md:pb-4 shrink-0">
                <div className="ml-10 md:ml-0">
                  <h1 className="text-lg md:text-xl font-bold text-gray-800 flex items-center">
                    評価ツール
                    <button onClick={() => setIsAudioEnabled(!isAudioEnabled)} className={`ml-2 md:ml-4 p-1.5 md:p-2 rounded-full border ${isAudioEnabled ? 'bg-blue-50 border-blue-200 text-blue-600' : 'bg-gray-100 border-gray-300 text-gray-400'}`} title={isAudioEnabled ? "音声を無効にする" : "音声を有効にする"}>
                      {isAudioEnabled ? <Volume2 className="w-4 h-4 md:w-5 md:h-5" /> : <VolumeX className="w-4 h-4 md:w-5 md:h-5" />}
                    </button>
                  </h1>
                  <p className="text-xs md:text-sm text-blue-600 font-bold mt-0.5 md:mt-1 truncate max-w-[200px] md:max-w-md">{activeScenario.title}</p>
                </div>
                <Activity className={`w-6 h-6 md:w-8 md:h-8 ${gameState === 'playing' ? 'text-red-500 animate-pulse' : 'text-gray-400'}`} />
              </div>

              <div className="flex space-x-2 md:space-x-4 mb-3 md:mb-4 shrink-0">
                <div className="flex-1 bg-gray-50 p-2 md:p-3 rounded-lg border border-gray-200 flex flex-col justify-center items-center">
                  <span className="text-[10px] md:text-xs text-gray-500 font-medium mb-0.5 md:mb-1">経過時間</span>
                  <span className={`text-xl md:text-2xl font-mono font-bold ${timeElapsed > (activeScenario.goalTime / 2) ? 'text-red-600' : 'text-gray-800'}`}>{formatTime(timeElapsed)}</span>
                </div>
                <div className="flex-1 bg-blue-50 p-2 md:p-3 rounded-lg flex flex-col justify-center items-center border border-blue-200">
                  <span className="text-[10px] md:text-xs text-blue-800 font-bold mb-0.5 md:mb-1">総合スコア</span>
                  <span className={`text-2xl md:text-3xl font-bold ${currentScore < 60 ? 'text-red-600' : 'text-blue-700'}`}>{currentScore} <span className="text-xs md:text-sm text-blue-500">/ 100</span></span>
                </div>
              </div>

              <div className="flex-1 overflow-y-auto pr-1 md:pr-2 pb-2 md:pb-4">
                <h3 className="font-semibold text-gray-700 mb-2 sticky top-0 bg-white py-1 z-10 border-b text-sm md:text-base">
                  評価項目 {gameState === 'ready' && <span className="text-blue-600 text-[10px] md:text-xs ml-2">※配点をセットしてください</span>}
                </h3>
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-2 md:gap-2">
                  {actions.map((action) => (
                    <div key={action.id} className={`flex flex-col p-2 md:p-2 rounded-lg border ${action.status !== 'pending' ? 'bg-gray-50 border-gray-300' : 'bg-white border-gray-200 shadow-sm hover:border-blue-300'} transition-all`}>
                      <div className="flex flex-col sm:flex-row sm:justify-between sm:items-start mb-2 gap-1">
                        <span className={`font-bold sm:font-medium text-sm leading-tight ${action.status !== 'pending' ? 'text-gray-600' : 'text-gray-800'}`}>{action.name}</span>
                        <div className="shrink-0 self-start flex flex-wrap gap-1 items-center">
                          {gameState === 'ready' ? (
                            <div className="flex items-center bg-yellow-50 rounded px-1.5 py-0.5 border border-yellow-200">
                              <span className="text-[10px] text-yellow-800 font-bold mr-1">目標:</span>
                              <input type="number" min="0" step="10" placeholder="なし" value={action.targetTime === null ? '' : action.targetTime} onChange={(e) => handleTargetTimeChange(action.id, e.target.value)} className="border border-gray-300 rounded w-10 sm:w-12 text-center text-[10px] py-0.5" />
                              <span className="text-[10px] text-gray-500 ml-1">秒</span>
                            </div>
                          ) : (
                            action.targetTime !== null && <span className={`inline-block px-1.5 py-0.5 rounded text-[10px] font-bold ${action.autoDeducted ? 'bg-red-100 text-red-800' : 'bg-yellow-100 text-yellow-800'}`}>目標: {formatTime(action.targetTime)} {action.autoDeducted && '(超過)'}</span>
                          )}
                        </div>
                      </div>
                      <div className="flex justify-between items-stretch space-x-1 mt-auto">
                        {action.status === 'success' ? (
                          <div className="flex-1 bg-green-100 text-green-700 py-1.5 px-2 rounded text-xs font-bold flex items-center justify-center border border-green-200"><CheckCircle className="w-3 h-3 mr-1"/>済 ({formatTime(action.executeTime)})</div>
                        ) : action.status === 'failed' ? (
                          <div className="flex-1 bg-red-100 text-red-700 py-1.5 px-2 rounded text-xs font-bold flex items-center justify-center border border-red-200"><XCircle className="w-3 h-3 mr-1"/>減点済 (-{action.penalty})</div>
                        ) : (
                          <div className="flex-1 flex space-x-1">
                            <button onClick={() => handleAction(action.id, 'success')} disabled={gameState !== 'playing'} className="flex-1 bg-blue-600 text-white rounded py-1.5 text-xs font-bold hover:bg-blue-700 disabled:bg-gray-200 disabled:text-gray-400 flex items-center justify-center shadow-sm"><CheckCircle className="w-3 h-3 mr-1"/>できた</button>
                            <button onClick={() => handleAction(action.id, 'failed')} disabled={gameState !== 'playing'} className="flex-1 bg-gray-600 text-white rounded py-1.5 text-xs font-bold hover:bg-gray-700 disabled:bg-gray-200 disabled:text-gray-400 flex items-center justify-center shadow-sm"><XCircle className="w-3 h-3 mr-1"/>減点</button>
                          </div>
                        )}
                        <div className={`flex items-center rounded p-1 border shrink-0 ${gameState === 'ready' ? 'bg-blue-50 border-blue-200' : 'bg-gray-50 border-gray-200'}`}>
                          <span className={`text-[10px] px-1 font-bold hidden xl:inline-block ${gameState === 'ready' ? 'text-blue-700' : 'text-gray-500'}`}>配点</span>
                          <select value={action.penalty} onChange={(e) => handlePenaltyChange(action.id, e.target.value)} disabled={gameState !== 'ready'} className="bg-white border border-gray-300 rounded text-xs font-bold text-gray-700 w-10 text-center py-0.5 cursor-pointer disabled:bg-transparent disabled:border-transparent disabled:text-gray-500">{[...Array(21).keys()].map(num => <option key={num} value={num}>-{num}</option>)}</select>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <div className="mt-2 md:mt-4 pt-3 md:pt-4 border-t border-gray-200 shrink-0">
                {gameState === 'ready' && <button onClick={startGame} className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 md:py-3 px-4 rounded-lg shadow-md text-sm md:text-base">▶ シミュレーション開始</button>}
                {(gameState === 'gameover' || gameState === 'clear' || gameState === 'playing') && <button onClick={startGame} className={`w-full font-bold py-2 md:py-3 px-4 rounded-lg text-sm md:text-base ${gameState === 'playing' ? 'bg-gray-200 text-gray-700' : 'bg-gray-800 text-white'}`}>{gameState === 'playing' ? 'リセット' : 'リトライする'}</button>}
              </div>
            </div>

            {/* 右：ログ */}
            <div className="w-full md:w-1/3 bg-gray-50 p-3 sm:p-4 md:p-6 md:pt-16 flex flex-col h-[35vh] md:h-[90vh]">
              <h2 className="font-bold text-gray-700 mb-2 md:mb-4 flex items-center shrink-0 text-sm md:text-base">活動記録</h2>
              <div className="flex-1 overflow-y-auto pr-1 md:pr-2 space-y-2 md:space-y-3">
                {logs.length === 0 && gameState === 'ready' ? (
                  <p className="text-gray-400 text-center mt-6 text-xs md:text-sm">設定を完了し、開始してください</p>
                ) : (
                  logs.map((log, index) => (
                    <div key={index} className={`p-2 md:p-3 rounded-lg text-xs md:text-sm ${log.type === 'warning' ? 'bg-yellow-100 text-yellow-800 border-l-4 border-yellow-500' : log.type === 'error' ? 'bg-red-100 text-red-800 border-l-4 border-red-500' : log.type === 'success' ? 'bg-green-100 text-green-800 border-l-4 border-green-500' : log.message.includes('【患者の声】') ? 'bg-purple-100 border-l-4 border-purple-500 text-purple-800' : 'bg-white border border-gray-200 text-gray-700'}`}>
                      {log.type === 'warning' && <AlertTriangle className="w-3 h-3 md:w-4 md:h-4 inline mr-1 mb-0.5" />}
                      {log.message}
                    </div>
                  ))
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
